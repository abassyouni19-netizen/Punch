<title>Punch</title>
<style>
  :root{
    --paper:#fbfaf7; --ink:#16191c; --muted:#6c7670; --line:#e7e2d8;
    --card:#ffffff; --green:#157f5a; --green-soft:#e6f1ec; --clay:#b1502f;
    --field:#ffffff; --invert-bg:#16191c; --invert-fg:#ffffff;
    --shadow:0 1px 2px rgba(22,25,28,.05), 0 8px 24px rgba(22,25,28,.06);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#141618; --ink:#f1eee8; --muted:#98a09a; --line:#2a2f33;
      --card:#1d2124; --green:#33b083; --green-soft:#17271f; --clay:#d98a68;
      --field:#22272b; --invert-bg:#2c3237; --invert-fg:#f1eee8;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
    }
  }
  html{color-scheme:light dark}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:var(--sans); background:var(--paper); color:var(--ink);
    padding:max(14px,env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
    max-width:520px; margin:0 auto; -webkit-font-smoothing:antialiased;
  }
  header{display:flex;align-items:baseline;justify-content:space-between;margin:6px 2px 16px}
  .brand{font-weight:700;letter-spacing:-.02em;font-size:20px}
  .brand span{color:var(--green)}
  .today-date{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}

  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}

  /* hero */
  .hero{padding:18px 18px 20px;margin-bottom:14px}
  .sites{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .chip{font-size:13px;font-weight:600;padding:7px 12px;border-radius:999px;border:1px solid var(--line);
    background:var(--field);color:var(--muted);cursor:pointer}
  .chip.on{background:var(--invert-bg);color:var(--invert-fg);border-color:var(--invert-bg)}
  .chip.add{color:var(--green);border-style:dashed}
  .sites.locked .chip{opacity:.45;pointer-events:none}
  .sites.locked .chip.on{opacity:1}

  .readout{text-align:center;padding:6px 0 4px}
  .status{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .status.live{color:var(--green)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:7px;vertical-align:1px;
    animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.28}}
  .timer{font-family:var(--mono);font-size:54px;line-height:1.05;font-weight:600;letter-spacing:-.02em;
    font-variant-numeric:tabular-nums;margin:6px 0 2px}
  .since{font-size:13px;color:var(--muted);min-height:18px;font-variant-numeric:tabular-nums}

  .btn{width:100%;border:0;border-radius:14px;padding:18px;font-size:18px;font-weight:700;font-family:var(--sans);
    margin-top:16px;cursor:pointer;letter-spacing:-.01em}
  .btn.in{background:var(--green);color:#fff}
  .btn.out{background:var(--invert-bg);color:var(--invert-fg)}
  .btn:active{transform:translateY(1px)}

  /* stats */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
  .stat{padding:14px 16px}
  .stat .k{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.02em}
  .stat .v{font-family:var(--mono);font-size:26px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:4px}
  .stat .d{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:1px}

  /* log */
  .log-head{display:flex;align-items:center;justify-content:space-between;margin:0 4px 10px}
  .log-head h2{font-size:14px;font-weight:700;margin:0;letter-spacing:.01em}
  .actions{display:flex;gap:14px}
  .link{background:none;border:0;color:var(--green);font-weight:600;font-size:13px;cursor:pointer;padding:0;font-family:var(--sans)}
  .day{margin-bottom:14px}
  .day-head{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px 6px}
  .day-name{font-size:13px;font-weight:700}
  .day-total{font-family:var(--mono);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
  .day-total small{color:var(--muted);font-weight:500}
  .sess{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  .sess:first-child{border-top-left-radius:14px;border-top-right-radius:14px}
  .sess:last-child{border-bottom:0;border-bottom-left-radius:14px;border-bottom-right-radius:14px}
  .sess .time{font-family:var(--mono);font-size:14px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .sess .site{font-size:12px;color:var(--muted);margin-top:2px}
  .sess .grow{flex:1;min-width:0}
  .sess .dur{font-family:var(--mono);font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;text-align:right}
  .sess .dur small{display:block;color:var(--muted);font-weight:500;font-size:11px}
  .empty{text-align:center;color:var(--muted);padding:34px 12px;font-size:14px}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(22,25,28,.4);display:none;align-items:flex-end;z-index:20}
  .scrim.open{display:flex}
  .sheet{background:var(--paper);width:100%;max-width:520px;margin:0 auto;border-radius:20px 20px 0 0;
    padding:18px 18px calc(20px + env(safe-area-inset-bottom));border:1px solid var(--line)}
  .sheet h3{margin:2px 0 16px;font-size:17px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;font-family:var(--sans);font-size:16px;padding:12px;border:1px solid var(--line);
    border-radius:12px;background:var(--field);color:var(--ink)}
  .sheet .sites{margin-bottom:6px}
  .sheet-btns{display:flex;gap:10px;margin-top:18px}
  .sheet-btns button{flex:1;border-radius:12px;padding:14px;font-size:15px;font-weight:700;border:0;cursor:pointer;font-family:var(--sans)}
  .save{background:var(--green);color:#fff}
  .cancel{background:var(--field);border:1px solid var(--line)!important;color:var(--ink)}
  .del{background:none;border:0;color:var(--clay);font-weight:600;font-size:13px;margin-top:14px;width:100%;cursor:pointer;font-family:var(--sans)}
  .footer{display:flex;align-items:center;justify-content:center;gap:10px;margin:26px 0 4px}
  .foot-link{background:none;border:0;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--sans);padding:4px}
  .foot-link.danger{color:var(--clay);opacity:.85}
  .foot-sep{color:var(--muted);opacity:.5}
  .imp-hint{font-size:13px;color:var(--muted);line-height:1.4;margin:0 0 12px}
  #impText{width:100%;min-height:120px;font-family:var(--mono);font-size:13px;padding:12px;border:1px solid var(--line);
    border-radius:12px;background:var(--field);color:var(--ink);resize:vertical}

  /* report (screen-hidden, shown only when printing / saving PDF) */
  .printonly{display:none}
  #printArea{font-family:var(--sans);color:#000}
  #printArea .rpt-head{border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:16px}
  #printArea h1{margin:0 0 4px;font-size:22px;letter-spacing:-.02em}
  #printArea .meta{font-size:12px;color:#444}
  #printArea .rpt-day{margin-bottom:12px;break-inside:avoid}
  #printArea .rpt-dayh{display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px solid #bbb;padding:6px 0 4px;font-weight:700;font-size:13px}
  #printArea .rpt-dayh .t{font-variant-numeric:tabular-nums}
  #printArea .row{display:flex;justify-content:space-between;gap:12px;padding:4px 0;font-size:12px}
  #printArea .row .site{flex:1;color:#333;text-align:center}
  #printArea .row .time,#printArea .row .hrs{font-variant-numeric:tabular-nums;white-space:nowrap}
  #printArea .rpt-sum{margin-top:22px;border-top:2px solid #000;padding-top:12px;break-inside:avoid}
  #printArea .rpt-sum .grand{display:flex;justify-content:space-between;font-size:16px;font-weight:800;margin-bottom:10px}
  #printArea .rpt-sum .grand .t{font-variant-numeric:tabular-nums}
  #printArea .rpt-sub{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#666;margin:8px 0 4px}
  #printArea .srow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;font-variant-numeric:tabular-nums}

  @media print{
    body > *{display:none !important}
    #printArea{display:block !important}
    body{padding:24px !important;background:#fff !important}
    @page{margin:14mm}
  }
</style>
</head>
<body>
<header>
  <div class="brand">Punch<span>.</span></div>
  <div class="today-date" id="todayDate"></div>
</header>

<section class="card hero">
  <div class="sites" id="sites"></div>
  <div class="readout">
    <div class="status" id="status">Clocked out</div>
    <div class="timer" id="timer">0:00</div>
    <div class="since" id="since"></div>
  </div>
  <button class="btn in" id="punch">Clock in</button>
</section>

<section class="stats">
  <div class="card stat"><div class="k">Today</div><div class="v" id="todayV">0:00</div><div class="d" id="todayD">0.00 hrs</div></div>
  <div class="card stat"><div class="k">This week</div><div class="v" id="weekV">0:00</div><div class="d" id="weekD">0.00 hrs</div></div>
</section>

<div class="log-head">
  <h2>Shift log</h2>
  <div class="actions">
    <button class="link" id="addBtn">+ Add</button>
    <button class="link" id="pdfBtn">PDF</button>
    <button class="link" id="exportBtn">CSV</button>
  </div>
</div>
<div id="log"></div>
<div class="footer">
  <button class="foot-link" id="importBtn">Import data</button>
  <span class="foot-sep">·</span>
  <button class="foot-link danger" id="resetBtn">Erase all data</button>
</div>

<div class="scrim" id="scrim">
  <div class="sheet">
    <h3 id="sheetTitle">Edit shift</h3>
    <div class="sites" id="sheetSites"></div>
    <div class="field"><label>Clock in</label><input type="datetime-local" id="ein"></div>
    <div class="field"><label>Clock out</label><input type="datetime-local" id="eout"></div>
    <div class="sheet-btns">
      <button class="cancel" id="cancelBtn">Cancel</button>
      <button class="save" id="saveBtn">Save</button>
    </div>
    <button class="del" id="delBtn">Delete this shift</button>
  </div>
</div>

<div id="printArea" class="printonly"></div>

<div class="scrim" id="impScrim">
  <div class="sheet">
    <h3>Import shifts</h3>
    <p class="imp-hint">Paste a CSV you exported from Punch (or a JSON backup). Imported shifts are added to your log; exact duplicates are skipped.</p>
    <textarea id="impText" placeholder="Paste your exported data here..."></textarea>
    <div class="sheet-btns">
      <button class="cancel" id="impCancel">Cancel</button>
      <button class="save" id="impGo">Import</button>
    </div>
  </div>
</div>

<script>
const KEY="punchclock_v1";
const DEFAULT={sessions:[],current:null,sites:["SRH Specialty Pharmacy","Arlington Pharmacy"],lastSite:"SRH Specialty Pharmacy"};
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));return s&&s.sites?s:{...DEFAULT}}catch(e){return {...DEFAULT}}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}}
let state=load();
let editingId=null, editSite=state.lastSite, tick=null;

const $=s=>document.querySelector(s);
const pad=n=>String(n).padStart(2,"0");
const HR=3600000;
function hm(ms){const t=Math.max(0,Math.round(ms/60000));return Math.floor(t/60)+":"+pad(t%60);}
function hms(ms){const t=Math.max(0,Math.floor(ms/1000));return Math.floor(t/3600)+":"+pad(Math.floor(t%3600/60))+":"+pad(t%60);}
function dec(ms){return (ms/HR).toFixed(2);}
function clockOf(ms){return new Date(ms).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});}
function dayKey(ms){const d=new Date(ms);return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function dayStart(){const d=new Date();d.setHours(0,0,0,0);return d.getTime();}
function weekStart(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());return d.getTime();}
function toInput(ms){const d=new Date(ms-d_off(ms));return d.toISOString().slice(0,16);}
function d_off(ms){return new Date(ms).getTimezoneOffset()*60000;}
function fromInput(v){return new Date(v).getTime();}

function dayName(key){
  const t=dayKey(Date.now()), y=dayKey(Date.now()-86400000);
  if(key===t)return "Today";
  if(key===y)return "Yesterday";
  const [Y,M,D]=key.split("-").map(Number);
  return new Date(Y,M-1,D).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"});
}

/* ---------- site chips ---------- */
function renderSites(){
  const wrap=$("#sites");
  wrap.className="sites"+(state.current?" locked":"");
  wrap.innerHTML="";
  const active=state.current?state.current.site:state.lastSite;
  state.sites.forEach(s=>{
    const b=document.createElement("button");
    b.className="chip"+(s===active?" on":"");
    b.textContent=s;
    b.onclick=()=>{if(state.current)return;state.lastSite=s;save();renderSites();};
    wrap.appendChild(b);
  });
  if(!state.current){
    const add=document.createElement("button");
    add.className="chip add";add.textContent="+ Site";
    add.onclick=()=>{const n=prompt("Add a workplace name");if(n&&n.trim()){state.sites.push(n.trim());state.lastSite=n.trim();save();renderSites();}};
    wrap.appendChild(add);
  }
}

/* ---------- hero / timer ---------- */
function paintTimer(){
  if(state.current){
    const el=Date.now()-state.current.start;
    $("#timer").textContent=hms(el);
    $("#status").innerHTML='<span class="dot"></span>On the clock';
    $("#status").className="status live";
    $("#since").textContent="Since "+clockOf(state.current.start)+" · "+state.current.site;
    const b=$("#punch");b.className="btn out";b.textContent="Clock out";
  }else{
    $("#timer").textContent="0:00";
    $("#status").textContent="Clocked out";$("#status").className="status";
    $("#since").textContent="";
    const b=$("#punch");b.className="btn in";b.textContent="Clock in";
  }
}
function startTick(){stopTick();tick=setInterval(()=>{paintTimer();paintStats();},1000);}
function stopTick(){if(tick){clearInterval(tick);tick=null;}}

function punch(){
  if(state.current){
    const s=state.current;
    if(Date.now()-s.start>1000)
      state.sessions.push({id:Date.now()+"",start:s.start,end:Date.now(),site:s.site});
    state.current=null;stopTick();
  }else{
    state.current={start:Date.now(),site:state.lastSite};startTick();
  }
  save();renderAll();
}

/* ---------- stats ---------- */
function sumFrom(from){
  let t=0;
  state.sessions.forEach(s=>{if(s.start>=from)t+=s.end-s.start;});
  if(state.current&&state.current.start>=from)t+=Date.now()-state.current.start;
  return t;
}
function paintStats(){
  const d=sumFrom(dayStart()), w=sumFrom(weekStart());
  $("#todayV").textContent=hm(d);$("#todayD").textContent=dec(d)+" hrs";
  $("#weekV").textContent=hm(w);$("#weekD").textContent=dec(w)+" hrs";
}

/* ---------- log ---------- */
function renderLog(){
  const log=$("#log");log.innerHTML="";
  if(state.sessions.length===0){
    log.innerHTML='<div class="card empty">No shifts logged yet.<br>Tap <b>Clock in</b> to start.</div>';return;
  }
  const groups={};
  state.sessions.forEach(s=>{(groups[dayKey(s.start)]=groups[dayKey(s.start)]||[]).push(s);});
  Object.keys(groups).sort().reverse().forEach(key=>{
    const items=groups[key].sort((a,b)=>b.start-a.start);
    const total=items.reduce((t,s)=>t+(s.end-s.start),0);
    const day=document.createElement("div");day.className="day";
    const head=document.createElement("div");head.className="day-head";
    head.innerHTML='<span class="day-name">'+dayName(key)+'</span>'+
      '<span class="day-total">'+hm(total)+' <small>· '+dec(total)+' hrs</small></span>';
    day.appendChild(head);
    const card=document.createElement("div");card.className="card";
    items.forEach(s=>{
      const row=document.createElement("div");row.className="sess";
      row.innerHTML='<div class="grow"><div class="time">'+clockOf(s.start)+' – '+clockOf(s.end)+'</div>'+
        '<div class="site">'+s.site+'</div></div>'+
        '<div class="dur">'+hm(s.end-s.start)+'<small>'+dec(s.end-s.start)+' hrs</small></div>';
      row.onclick=()=>openSheet(s.id);
      card.appendChild(row);
    });
    day.appendChild(card);log.appendChild(day);
  });
}

/* ---------- edit / add sheet ---------- */
function renderSheetSites(){
  const wrap=$("#sheetSites");wrap.innerHTML="";
  state.sites.forEach(s=>{
    const b=document.createElement("button");
    b.className="chip"+(s===editSite?" on":"");b.textContent=s;
    b.onclick=()=>{editSite=s;renderSheetSites();};
    wrap.appendChild(b);
  });
}
function openSheet(id){
  editingId=id;
  let start,end,site;
  if(id){const s=state.sessions.find(x=>x.id===id);start=s.start;end=s.end;site=s.site;$("#delBtn").style.display="block";$("#sheetTitle").textContent="Edit shift";}
  else{end=Date.now();start=end-HR;site=state.lastSite;$("#delBtn").style.display="none";$("#sheetTitle").textContent="Add a past shift";}
  editSite=site;renderSheetSites();
  $("#ein").value=toInput(start);$("#eout").value=toInput(end);
  $("#scrim").classList.add("open");
}
function closeSheet(){$("#scrim").classList.remove("open");editingId=null;}
function saveSheet(){
  const start=fromInput($("#ein").value), end=fromInput($("#eout").value);
  if(!start||!end){alert("Please set both times.");return;}
  if(end<=start){alert("Clock out must be after clock in.");return;}
  if(editingId){const s=state.sessions.find(x=>x.id===editingId);s.start=start;s.end=end;s.site=editSite;}
  else{state.sessions.push({id:Date.now()+"",start,end,site:editSite});}
  save();closeSheet();renderAll();
}
function delSheet(){
  if(editingId&&confirm("Delete this shift?")){
    state.sessions=state.sessions.filter(x=>x.id!==editingId);save();closeSheet();renderAll();
  }
}

/* ---------- export ---------- */
function exportCSV(){
  if(state.sessions.length===0){alert("No shifts to export yet.");return;}
  const rows=[["Date","Site","Clock in","Clock out","Hours"]];
  state.sessions.slice().sort((a,b)=>a.start-b.start).forEach(s=>{
    rows.push([new Date(s.start).toLocaleDateString(),s.site,clockOf(s.start),clockOf(s.end),dec(s.end-s.start)]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(csv).then(()=>alert("Copied as CSV. Paste into Notes, Mail, or a spreadsheet.")).catch(()=>fallback(csv));
  }else fallback(csv);
}
function fallback(t){prompt("Copy your timesheet (CSV):",t);}

/* ---------- pdf / print report ---------- */
function longDate(ms){return new Date(ms).toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});}
function printPDF(){
  if(state.sessions.length===0){alert("No shifts to export yet.");return;}
  const sess=state.sessions.slice().sort((a,b)=>a.start-b.start);
  const groups={};
  sess.forEach(s=>{(groups[dayKey(s.start)]=groups[dayKey(s.start)]||[]).push(s);});
  let grand=0; const bySite={};
  let body="";
  Object.keys(groups).sort().forEach(key=>{
    const items=groups[key].sort((a,b)=>a.start-b.start);
    const dtot=items.reduce((t,s)=>t+(s.end-s.start),0);
    let rows="";
    items.forEach(s=>{
      const dur=s.end-s.start; grand+=dur; bySite[s.site]=(bySite[s.site]||0)+dur;
      rows+='<div class="row"><span class="time">'+clockOf(s.start)+' – '+clockOf(s.end)+
            '</span><span class="site">'+s.site+'</span><span class="hrs">'+hm(dur)+' · '+dec(dur)+'</span></div>';
    });
    body+='<div class="rpt-day"><div class="rpt-dayh"><span>'+dayName(key)+', '+longDate(items[0].start)+
          '</span><span class="t">'+hm(dtot)+' · '+dec(dtot)+' hrs</span></div>'+rows+'</div>';
  });
  let siteRows="";
  Object.keys(bySite).sort().forEach(k=>{
    siteRows+='<div class="srow"><span>'+k+'</span><span>'+hm(bySite[k])+' · '+dec(bySite[k])+' hrs</span></div>';
  });
  const range=longDate(sess[0].start)+' – '+longDate(sess[sess.length-1].start);
  document.getElementById("printArea").innerHTML=
    '<div class="rpt-head"><h1>Timesheet</h1>'+
    '<div class="meta">Punch · '+range+'</div>'+
    '<div class="meta">Generated '+longDate(Date.now())+'</div></div>'+
    body+
    '<div class="rpt-sum"><div class="grand"><span>Total hours</span>'+
    '<span class="t">'+hm(grand)+' · '+dec(grand)+' hrs</span></div>'+
    '<div class="rpt-sub">By site</div>'+siteRows+'</div>';
  window.print();
}

/* ---------- import ---------- */
function csvCells(line){
  const out=[];let cur="",q=false;
  for(let i=0;i<line.length;i++){const c=line[i];
    if(q){if(c==='"'){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else{if(c==='"')q=true;else if(c===","){out.push(cur);cur="";}else cur+=c;}}
  out.push(cur);return out.map(s=>s.trim());
}
function parseDT(dateStr,timeStr){
  const dm=(dateStr||"").match(/(\d{1,4})\D(\d{1,2})\D(\d{1,4})/);
  if(!dm)return NaN;
  let a=+dm[1],b=+dm[2],c=+dm[3],Y,M,D;
  if(a>31){Y=a;M=b;D=c;}else{M=a;D=b;Y=c;}
  if(Y<100)Y+=2000;
  const tm=(timeStr||"").match(/(\d{1,2}):(\d{2})(?::\d{2})?\s*([AaPp][Mm])?/);
  if(!tm)return NaN;
  let h=+tm[1];const min=+tm[2],ap=tm[3]?tm[3].toLowerCase():null;
  if(ap==="pm"&&h<12)h+=12; if(ap==="am"&&h===12)h=0;
  return new Date(Y,M-1,D,h,min,0).getTime();
}
function parseImport(text){
  text=(text||"").trim();
  if(!text)return [];
  if(text[0]==="["||text[0]==="{"){
    try{const j=JSON.parse(text);const arr=Array.isArray(j)?j:(j.sessions||[]);
      return arr.map((s,i)=>({id:"imp"+Date.now()+i,start:+new Date(s.start),end:+new Date(s.end),site:s.site||"Imported"}))
        .filter(s=>s.start&&s.end&&!isNaN(s.start)&&!isNaN(s.end)&&s.end>s.start);
    }catch(e){return null;}
  }
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const out=[];
  lines.forEach((line,i)=>{
    const c=csvCells(line);
    if(c.length<4)return;
    if(i===0&&/date/i.test(c[0]))return;
    const start=parseDT(c[0],c[2]), end=parseDT(c[0],c[3]);
    if(!start||!end||isNaN(start)||isNaN(end)||end<=start)return;
    out.push({id:"imp"+start+"_"+i,start,end,site:c[1]||"Imported"});
  });
  return out;
}
function openImp(){$("#impText").value="";$("#impScrim").classList.add("open");}
function closeImp(){$("#impScrim").classList.remove("open");}
function doImport(){
  const parsed=parseImport($("#impText").value);
  if(parsed===null){alert("Couldn't read that. Paste a CSV exported from Punch, or a JSON backup.");return;}
  if(parsed.length===0){alert("No shifts found in what you pasted. Check the format and try again.");return;}
  const seen=new Set(state.sessions.map(s=>s.start+"_"+s.end));
  let added=0;
  parsed.forEach(s=>{const k=s.start+"_"+s.end;if(!seen.has(k)){state.sessions.push(s);seen.add(k);added++;
    if(s.site&&!state.sites.includes(s.site))state.sites.push(s.site);}});
  save();closeImp();renderAll();
  const dup=parsed.length-added;
  alert(added+" shift"+(added===1?"":"s")+" imported"+(dup>0?", "+dup+" already existed":"")+".");
}

/* ---------- wire up ---------- */
function renderAll(){renderSites();paintTimer();paintStats();renderLog();}
$("#punch").onclick=punch;
$("#addBtn").onclick=()=>openSheet(null);
$("#exportBtn").onclick=exportCSV;
$("#pdfBtn").onclick=printPDF;
$("#importBtn").onclick=openImp;
$("#impCancel").onclick=closeImp;
$("#impGo").onclick=doImport;
$("#impScrim").onclick=e=>{if(e.target===$("#impScrim"))closeImp();};
$("#saveBtn").onclick=saveSheet;
$("#cancelBtn").onclick=closeSheet;
$("#delBtn").onclick=delSheet;
$("#scrim").onclick=e=>{if(e.target===$("#scrim"))closeSheet();};
$("#resetBtn").onclick=()=>{if(confirm("Erase ALL clock data permanently?")){state={...DEFAULT};save();renderAll();}};
$("#todayDate").textContent=new Date().toLocaleDateString([],{weekday:"long",month:"long",day:"numeric"});

renderAll();
if(state.current)startTick();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest"><title>Punch — Timeclock</title>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<style>
:root{--bg:#f3f5f9;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--brand:#2563eb;--good:#16a34a;--bad:#dc2626;--shadow:0 12px 30px rgba(15,23,42,.08)}
[data-theme=dark]{--bg:#090e1a;--card:#111827;--text:#f8fafc;--muted:#94a3b8;--line:#263244;--brand:#60a5fa;--shadow:0 12px 30px rgba(0,0,0,.28)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}.wrap{max-width:920px;margin:auto;padding:calc(18px + env(safe-area-inset-top)) 16px calc(90px + env(safe-area-inset-bottom))}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{font-weight:800;font-size:22px}.muted{color:var(--muted)}button,input,select,textarea{font:inherit}.iconbtn,.btn{border:0;border-radius:14px;padding:12px 15px;background:var(--card);color:var(--text);box-shadow:var(--shadow);font-weight:700}.btn.primary{background:var(--brand);color:white}.btn.danger{background:var(--bad);color:white}.btn.good{background:var(--good);color:white}.grid{display:grid;gap:14px}.hero{background:linear-gradient(145deg,#111827,#1d4ed8);color:white;border-radius:28px;padding:25px;box-shadow:var(--shadow)}.clock{font-size:45px;font-weight:800;letter-spacing:-1.5px}.date{opacity:.8}.status{display:inline-flex;margin-top:20px;padding:7px 11px;border-radius:999px;background:rgba(255,255,255,.14);font-size:13px;font-weight:700}.punch{width:100%;margin-top:18px;border:0;border-radius:18px;padding:17px;font-weight:800;font-size:18px;background:white;color:#111827}.stats{grid-template-columns:repeat(3,1fr)}.card{background:var(--card);border-radius:22px;padding:18px;box-shadow:var(--shadow)}.stat b{display:block;font-size:23px;margin-top:5px}.sectionhead{display:flex;justify-content:space-between;align-items:center;margin:20px 2px 10px}.sectionhead h2{font-size:18px;margin:0}.toolbar{display:flex;flex-wrap:wrap;gap:8px}.toolbar .btn{box-shadow:none;border:1px solid var(--line);padding:9px 11px;font-size:13px}.entry{display:grid;grid-template-columns:1fr auto;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}.entry:last-child{border:0}.entry .times{font-weight:700}.entry .total{font-weight:800}.entry small{color:var(--muted)}.week{margin-bottom:14px}.week-title{display:flex;justify-content:space-between;font-weight:800;padding-bottom:10px;border-bottom:1px solid var(--line)}.empty{text-align:center;padding:28px;color:var(--muted)}.fab{position:fixed;right:18px;bottom:calc(20px + env(safe-area-inset-bottom));border:0;border-radius:50%;width:58px;height:58px;background:var(--brand);color:white;font-size:28px;box-shadow:0 15px 30px rgba(37,99,235,.35)}dialog{border:0;border-radius:24px;background:var(--card);color:var(--text);width:min(92vw,520px);padding:0;box-shadow:0 30px 80px rgba(0,0,0,.35)}dialog::backdrop{background:rgba(0,0,0,.55)}.modal{padding:20px}.modal h3{margin-top:0}.field{display:grid;gap:6px;margin:12px 0}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--bg);color:var(--text)}.actions{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}.actions .btn{box-shadow:none;border:1px solid var(--line)}.notice{font-size:13px;background:var(--bg);border-radius:12px;padding:10px;color:var(--muted)}@media(max-width:560px){.stats{grid-template-columns:1fr 1fr}.stats .card:last-child{grid-column:1/-1}.clock{font-size:39px}}
</style></head>
<body><main class="wrap">
<div class="top"><div><div class="brand">Punch</div><div class="muted" id="workplaceLabel">Personal Timeclock</div></div><button class="iconbtn" id="themeBtn" aria-label="Toggle theme">◐</button></div>
<section class="hero"><div class="clock" id="clock">--:--:--</div><div class="date" id="date"></div><div class="status" id="status">Clocked out</div><button class="punch" id="punchBtn">Clock In</button></section>
<div class="grid stats" style="margin-top:14px"><div class="card stat"><span class="muted">Today</span><b id="todayTotal">0h 00m</b></div><div class="card stat"><span class="muted">This week</span><b id="weekTotal">0h 00m</b></div><div class="card stat"><span class="muted">Weekly OT</span><b id="otTotal">0h 00m</b></div></div>
<div class="sectionhead"><h2>Time history</h2><div class="toolbar"><button class="btn" id="reportBtn">PDF report</button><button class="btn" id="moreBtn">More</button></div></div>
<div id="history"></div>
<button class="fab" id="addBtn" aria-label="Add time entry">+</button>
</main>
<dialog id="entryDialog"><form method="dialog" class="modal" id="entryForm"><h3 id="entryTitle">Add time entry</h3><input type="hidden" id="entryId"><div class="field"><label>Date</label><input id="entryDate" type="date" required></div><div class="field"><label>Clock in</label><input id="entryIn" type="time" required></div><div class="field"><label>Clock out</label><input id="entryOut" type="time"></div><div class="field"><label>Workplace</label><input id="entryWorkplace" placeholder="Skagit, Arlington, etc."></div><div class="field"><label>Notes</label><textarea id="entryNotes" rows="2"></textarea></div><div class="actions"><button class="btn" value="cancel">Cancel</button><button class="btn primary" id="saveEntry" value="default">Save</button></div></form></dialog>
<dialog id="moreDialog"><div class="modal"><h3>Data & settings</h3><div class="field"><label>Default workplace</label><input id="defaultWorkplace" placeholder="Personal Timeclock"></div><div class="field"><label>Week starts</label><select id="weekStart"><option value="0">Sunday</option><option value="1">Monday</option></select></div><div class="field"><label>Overtime after hours/week</label><input id="otThreshold" type="number" min="1" max="168" step="0.5"></div><div class="toolbar"><button class="btn" id="csvBtn">Export CSV</button><button class="btn" id="jsonBtn">Backup JSON</button><button class="btn" id="importBtn">Import backup</button><button class="btn" id="migrateBtn">Scan old data</button></div><input type="file" id="fileInput" accept="application/json" hidden><p class="notice">Punches are stored in this browser on this device. Use Backup JSON periodically, especially before clearing Safari website data.</p><div class="actions"><button class="btn" id="closeMore">Done</button></div></div></dialog>
<script>
const KEY='punch_v2_entries', SETTINGS='punch_v2_settings';let entries=[],settings={workplace:'Personal Timeclock',weekStart:0,ot:40,theme:'auto'};
const $=s=>document.querySelector(s), pad=n=>String(n).padStart(2,'0');
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(16).slice(2)}
function load(){try{entries=JSON.parse(localStorage.getItem(KEY)||'[]')}catch{entries=[]}try{settings={...settings,...JSON.parse(localStorage.getItem(SETTINGS)||'{}')}}catch{}if(!localStorage.getItem(KEY)) migrate(false);applySettings()}
function save(){localStorage.setItem(KEY,JSON.stringify(entries));localStorage.setItem(SETTINGS,JSON.stringify(settings));render()}
function applySettings(){$('#workplaceLabel').textContent=settings.workplace;$('#defaultWorkplace').value=settings.workplace;$('#weekStart').value=settings.weekStart;$('#otThreshold').value=settings.ot;const dark=settings.theme==='dark'||(settings.theme==='auto'&&matchMedia('(prefers-color-scheme:dark)').matches);document.documentElement.dataset.theme=dark?'dark':'light'}
function fmtDur(ms){ms=Math.max(0,ms||0);let m=Math.round(ms/60000);return `${Math.floor(m/60)}h ${pad(m%60)}m`}
function localISO(d=new Date()){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function parseDT(date,time){return new Date(`${date}T${time}:00`).getTime()}
function duration(e,now=Date.now()){return Math.max(0,(e.out||now)-e.in)}
function weekStartDate(d){let x=new Date(d);x.setHours(0,0,0,0);let diff=(x.getDay()-Number(settings.weekStart)+7)%7;x.setDate(x.getDate()-diff);return x}
function weekKey(ms){return localISO(weekStartDate(new Date(ms)))}
function active(){return entries.find(e=>!e.out)}
function updateClock(){let n=new Date();$('#clock').textContent=n.toLocaleTimeString([],{hour:'numeric',minute:'2-digit',second:'2-digit'});$('#date').textContent=n.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});let a=active();$('#status').textContent=a?`Clocked in • ${fmtDur(Date.now()-a.in)}`:'Clocked out';$('#punchBtn').textContent=a?'Clock Out':'Clock In';if(a)renderStatsOnly()}
function totals(){let now=Date.now(),today=localISO(),wk=weekKey(now),t=0,w=0;entries.forEach(e=>{let d=duration(e,now);if(localISO(new Date(e.in))===today)t+=d;if(weekKey(e.in)===wk)w+=d});return{t,w,ot:Math.max(0,w-settings.ot*3600000)}}
function renderStatsOnly(){let x=totals();$('#todayTotal').textContent=fmtDur(x.t);$('#weekTotal').textContent=fmtDur(x.w);$('#otTotal').textContent=fmtDur(x.ot)}
function esc(s=''){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function render(){renderStatsOnly();let grouped={};[...entries].sort((a,b)=>b.in-a.in).forEach(e=>(grouped[weekKey(e.in)]??=[]).push(e));let keys=Object.keys(grouped).sort().reverse();$('#history').innerHTML=keys.length?keys.map(k=>{let arr=grouped[k],sum=arr.reduce((a,e)=>a+duration(e),0),start=new Date(k+'T00:00:00'),end=new Date(start);end.setDate(end.getDate()+6);return `<section class="card week"><div class="week-title"><span>${start.toLocaleDateString([],{month:'short',day:'numeric'})} – ${end.toLocaleDateString([],{month:'short',day:'numeric'})}</span><span>${fmtDur(sum)}</span></div>${arr.map(e=>{let i=new Date(e.in),o=e.out?new Date(e.out):null;return `<div class="entry" data-id="${e.id}"><div><div class="times">${i.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})} · ${i.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})} – ${o?o.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}):'Active'}</div><small>${esc(e.workplace||settings.workplace)}${e.notes?' · '+esc(e.notes):''}</small></div><div class="total">${fmtDur(duration(e))}</div></div>`}).join('')}</section>`}).join(''):'<div class="card empty">No punches yet. Tap Clock In or + to add one.</div>'}
function punch(){let a=active();if(a)a.out=Date.now();else entries.push({id:uid(),in:Date.now(),out:null,workplace:settings.workplace,notes:''});save()}
function openEntry(e=null){$('#entryTitle').textContent=e?'Edit time entry':'Add time entry';$('#entryId').value=e?.id||'';let i=e?new Date(e.in):new Date();let o=e?.out?new Date(e.out):null;$('#entryDate').value=localISO(i);$('#entryIn').value=`${pad(i.getHours())}:${pad(i.getMinutes())}`;$('#entryOut').value=o?`${pad(o.getHours())}:${pad(o.getMinutes())}`:'';$('#entryWorkplace').value=e?.workplace||settings.workplace;$('#entryNotes').value=e?.notes||'';$('#entryDialog').showModal()}
function saveEntry(ev){ev.preventDefault();let id=$('#entryId').value,date=$('#entryDate').value,inn=$('#entryIn').value,out=$('#entryOut').value;let obj={id:id||uid(),in:parseDT(date,inn),out:out?parseDT(date,out):null,workplace:$('#entryWorkplace').value.trim(),notes:$('#entryNotes').value.trim()};if(obj.out&&obj.out<=obj.in){obj.out+=86400000}if(id){let ix=entries.findIndex(e=>e.id===id);entries[ix]=obj}else{if(active()&&!obj.out)return alert('Clock out the active shift before adding another active shift.');entries.push(obj)}$('#entryDialog').close();save()}
function reportRows(){return [...entries].filter(e=>e.out).sort((a,b)=>a.in-b.in)}
function pdf(){let rows=reportRows();if(!rows.length)return alert('No completed shifts to report.');if(!window.jspdf)return window.print();let {jsPDF}=window.jspdf,doc=new jsPDF(),y=18;doc.setFontSize(18);doc.text('Punch Time Report',14,y);y+=8;doc.setFontSize(10);doc.text(`Generated ${new Date().toLocaleString()}`,14,y);y+=10;let weeks={};rows.forEach(e=>(weeks[weekKey(e.in)]??=[]).push(e));Object.entries(weeks).forEach(([k,arr])=>{if(y>260){doc.addPage();y=18}let start=new Date(k+'T00:00:00'),sum=arr.reduce((a,e)=>a+duration(e),0);doc.setFontSize(12);doc.text(`Week of ${start.toLocaleDateString()} — ${fmtDur(sum)}`,14,y);y+=7;doc.setFontSize(9);arr.forEach(e=>{if(y>280){doc.addPage();y=18}let i=new Date(e.in),o=new Date(e.out);doc.text(i.toLocaleDateString(),14,y);doc.text(i.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}),52,y);doc.text(o.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}),82,y);doc.text(fmtDur(duration(e)),112,y);doc.text((e.workplace||'').slice(0,35),142,y);y+=6});let ot=Math.max(0,sum-settings.ot*3600000);doc.text(`Regular: ${fmtDur(sum-ot)}   Overtime: ${fmtDur(ot)}   Total: ${fmtDur(sum)}`,14,y);y+=10});doc.save(`Punch-report-${localISO()}.pdf`)}
function download(name,text,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function csv(){let out='Date,Clock In,Clock Out,Hours,Workplace,Notes\n'+reportRows().map(e=>{let i=new Date(e.in),o=new Date(e.out);return [localISO(i),i.toLocaleTimeString(),o.toLocaleTimeString(),(duration(e)/3600000).toFixed(2),e.workplace,e.notes].map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')}).join('\n');download(`Punch-${localISO()}.csv`,out,'text/csv')}
function backup(){download(`Punch-backup-${localISO()}.json`,JSON.stringify({version:2,exportedAt:new Date().toISOString(),settings,entries},null,2),'application/json')}
function normalize(raw){let arr=Array.isArray(raw)?raw:Array.isArray(raw?.entries)?raw.entries:Array.isArray(raw?.punches)?raw.punches:Array.isArray(raw?.records)?raw.records:[];return arr.map(x=>{let inv=x.in??x.clockIn??x.start??x.startTime??x.clock_in,out=x.out??x.clockOut??x.end??x.endTime??x.clock_out;let inn=typeof inv==='number'?inv:Date.parse(inv),ott=out?(typeof out==='number'?out:Date.parse(out)):null;if(!Number.isFinite(inn))return null;return{id:x.id||uid(),in:inn,out:Number.isFinite(ott)?ott:null,workplace:x.workplace||x.location||x.job||settings.workplace,notes:x.notes||x.note||''}}).filter(Boolean)}
function migrate(show=true){let found=[];for(let i=0;i<localStorage.length;i++){let k=localStorage.key(i);if(k===KEY||k===SETTINGS)continue;try{let n=normalize(JSON.parse(localStorage.getItem(k)));if(n.length)found.push(...n)}catch{}}let existing=new Set(entries.map(e=>`${e.in}-${e.out}`)),add=found.filter(e=>!existing.has(`${e.in}-${e.out}`));entries.push(...add);if(add.length)save();if(show)alert(add.length?`Imported ${add.length} older punch record${add.length===1?'':'s'}.`:'No additional recognizable old punch records were found.')}
$('#punchBtn').onclick=punch;$('#addBtn').onclick=()=>openEntry();$('#entryForm').onsubmit=saveEntry;$('#history').onclick=e=>{let row=e.target.closest('.entry');if(!row)return;let item=entries.find(x=>x.id===row.dataset.id);if(item&&confirm('Edit this entry? Tap Cancel to leave it unchanged.'))openEntry(item)};$('#reportBtn').onclick=pdf;$('#moreBtn').onclick=()=>$('#moreDialog').showModal();$('#closeMore').onclick=()=>{$('#moreDialog').close();settings.workplace=$('#defaultWorkplace').value.trim()||'Personal Timeclock';settings.weekStart=Number($('#weekStart').value);settings.ot=Number($('#otThreshold').value)||40;save();applySettings()};$('#csvBtn').onclick=csv;$('#jsonBtn').onclick=backup;$('#importBtn').onclick=()=>$('#fileInput').click();$('#migrateBtn').onclick=()=>migrate(true);$('#fileInput').onchange=async e=>{try{let raw=JSON.parse(await e.target.files[0].text()),n=normalize(raw);if(!n.length)throw Error();if(confirm(`Import ${n.length} entries? Existing data will be kept.`)){entries.push(...n);if(raw.settings)settings={...settings,...raw.settings};save();applySettings()}}catch{alert('That file is not a valid Punch backup.')}};$('#themeBtn').onclick=()=>{let dark=document.documentElement.dataset.theme==='dark';settings.theme=dark?'light':'dark';save();applySettings()};
load();render();updateClock();setInterval(updateClock,1000);if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script></body></html>
